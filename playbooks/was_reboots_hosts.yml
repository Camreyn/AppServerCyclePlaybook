---
# =============================================================================
# was_reboot_hosts.yml
# Reboot limited tier hosts (OS reboot between WAS stop/start)
#
# This playbook reboots hosts one at a time (serial: 1) to minimize impact.
# It waits for SSH connectivity before and after the reboot.
#
# Required variables:
#   - was_allow_disruptive: Must be true to proceed (safety gate)
#
# Optional variables:
#   - was_reboot_precheck_timeout_sec: Timeout for pre-reboot SSH check (default: 120)
#   - was_reboot_timeout_sec: Timeout for reboot operation (default: 1800)
#   - was_reboot_connect_timeout_sec: Timeout for SSH connect attempts (default: 10)
#   - was_reboot_pre_delay_sec: Delay before reboot (default: 0)
#   - was_reboot_post_delay_sec: Delay after reboot before testing (default: 10)
#   - was_reboot_test_command: Command to verify host is up (default: whoami)
#   - was_reboot_postcheck_timeout_sec: Timeout for post-reboot SSH check (default: 300)
# =============================================================================

- name: Reboot limited tier hosts (OS reboot between WAS stop/start)
  hosts: was_all_nodes
  gather_facts: false
  serial: 1

  tasks:
    - name: Safety check - require explicit approval for disruptive actions
      ansible.builtin.assert:
        that:
          - was_allow_disruptive | default(false) | bool
        fail_msg: >
          Disruptive actions are disabled.
          Set was_allow_disruptive=true (survey/extra vars) to proceed.
      run_once: true

    - name: Wait for SSH connectivity (pre-reboot)
      ansible.builtin.wait_for_connection:
        timeout: "120"

    - name: Reboot host
      ansible.builtin.reboot:
        msg: "AAP-triggered reboot (between WAS stop/start)"
        reboot_timeout: "1800"
        connect_timeout: "10"
        pre_reboot_delay: "0"
        post_reboot_delay: "10"
        test_command: "whoami"
      become: true
      become_method: sudo

    - name: Wait for SSH connectivity (post-reboot)
      ansible.builtin.wait_for_connection:
        timeout: "{{ was_reboot_postcheck_timeout_sec | default(300) }}"
