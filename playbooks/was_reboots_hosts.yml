---
# =============================================================================
# was_reboot_hosts.yml
# Reboot limited tier hosts (OS reboot between WAS stop/start)
#
# This playbook reboots hosts one at a time (serial: 1) to minimize impact.
# It waits for SSH connectivity before and after the reboot.
#
# Required variables:
#   - was_allow_disruptive: Must be true to proceed (safety gate)
#
# Optional variables:
#   - was_reboot_precheck_timeout_sec: Timeout for pre-reboot SSH check (default: 120)
#   - was_reboot_timeout_sec: Timeout for reboot operation (default: 1800)
#   - was_reboot_connect_timeout_sec: Timeout for SSH connect attempts (default: 10)
#   - was_reboot_pre_delay_sec: Delay before reboot (default: 0)
#   - was_reboot_post_delay_sec: Delay after reboot before testing (default: 10)
#   - was_reboot_test_command: Command to verify host is up (default: whoami)
#   - was_reboot_postcheck_timeout_sec: Timeout for post-reboot SSH check (default: 300)
#   - was_reboot_command: Explicit reboot command to use (default: systemctl reboot)
# =============================================================================

- name: Reboot limited tier hosts (OS reboot between WAS stop/start)
  hosts: was_all_nodes
  gather_facts: false

  vars:
    was_reboot_precheck_timeout_sec: 120
    was_reboot_timeout_sec: 1800
    was_reboot_connect_timeout_sec: 10
    was_reboot_pre_delay_sec: 0
    was_reboot_post_delay_sec: 10
    was_reboot_test_command: "whoami"
    was_reboot_postcheck_timeout_sec: 300

    # Explicit reboot command avoids some shutdown/wall/polkit paths that can
    # require interactive auth on certain hosts.
    was_reboot_command: "/usr/bin/systemctl reboot"

  tasks:
    - name: Safety check - require explicit approval for disruptive actions
      ansible.builtin.assert:
        that:
          - was_allow_disruptive | default(false) | bool
        fail_msg: >
          Disruptive actions are disabled.
          Set was_allow_disruptive=true (survey/extra vars) to proceed.
      run_once: true
      become: false

    - name: Wait for SSH connectivity (pre-reboot)
      ansible.builtin.wait_for_connection:
        timeout: "{{ was_reboot_precheck_timeout_sec }}"
      become: false

    - name: Reboot host
      ansible.builtin.reboot:
        reboot_command: "/usr/bin/systemctl --force --force reboot"
        reboot_timeout: "{{ was_reboot_timeout_sec | default(1800) }}"
        connect_timeout: "{{ was_reboot_connect_timeout_sec | default(10) }}"
        pre_reboot_delay: "{{ was_reboot_pre_delay_sec | default(0) }}"
        post_reboot_delay: "{{ was_reboot_post_delay_sec | default(10) }}"
        test_command: "{{ was_reboot_test_command | default('whoami') }}"
      become: true
      become_method: sudo

    - name: Wait for SSH connectivity (post-reboot)
      ansible.builtin.wait_for_connection:
        timeout: "{{ was_reboot_postcheck_timeout_sec }}"
      become: false

    - name: Show reboot result
      ansible.builtin.debug:
        msg: >-
          Reboot completed on {{ inventory_hostname }}.
          Elapsed={{ reboot_result.elapsed | default('unknown') }} seconds.
      become: false
