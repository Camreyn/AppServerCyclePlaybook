---
- name: Reboot RHEL hosts
  hosts: was_all_nodes
  gather_facts: false

  tasks:
    - name: Require explicit approval for disruptive action
      ansible.builtin.assert:
        that:
          - was_allow_disruptive | default(false) | bool
        fail_msg: "Set was_allow_disruptive=true to allow host reboots."
      run_once: true

    - name: Reboot host and wait for it to return
      ansible.builtin.reboot:
        reboot_timeout: 1800
        connect_timeout: 10
        post_reboot_delay: 15
        test_command: "whoami"
      become: true
      register: reboot_result

    - name: Show reboot result
      ansible.builtin.debug:
        msg: "Reboot completed on {{ inventory_hostname }} in {{ reboot_result.elapsed }} seconds."
