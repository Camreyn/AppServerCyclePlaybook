---
# =============================================================================
# was_start_discovered.yml
# Start discovered WAS application servers on limited tier hosts
#
# This playbook:
#   1. Validates required variables and disruptive-action approval
#   2. Resolves DMGR scripts and optionally starts the DMGR
#   3. Waits for the DMGR SOAP port
#   4. Stages wsadmin helper scripts on the DMGR host
#   5. Verifies deploy can su to wsadmin on the DMGR host
#   6. Builds the node list from the hosts in scope
#   7. Discovers application servers dynamically through the DMGR
#   8. Optionally starts nodeagents on each host
#   9. Starts each discovered application server via wsadmin
#  10. Verifies each discovered application server is RUNNING/STARTED
#  11. Prints a summary and fails if any discovered target did not verify
#
# Required variables:
#   - was_dmgr_host
#   - was_wsadmin_user
#   - was_wsadmin_pass
#   - was_node_name
#   - was_allow_disruptive
#
# Optional variables:
#   - was_run_user (default: wsadmin)
#   - was_dmgr_soap_port (default: 8879)
#   - was_dmgr_soap_wait_timeout_sec (default: 300)
#   - was_poll_timeout_sec (default: 600)
#   - was_poll_delay_sec (default: 5)
#   - was_start_dmgr (default: true)
#   - was_start_nodeagent (default: true)
#   - was_verify_after_start (default: true)
# =============================================================================

- name: Start discovered WAS application servers on limited tier hosts
  hosts: was_all_nodes
  gather_facts: false

  vars:
    was_run_user: wsadmin
    was_su_wsadmin_prefix: "sudo su - {{ was_run_user }} -c"
    was_wsadmin_stage_dir: /tmp/was_wsadmin_scripts

    was_dmgr_soap_port: 8879
    was_dmgr_soap_wait_timeout_sec: 300

    was_poll_timeout_sec: 600
    was_poll_delay_sec: 5

    was_start_dmgr: true
    was_start_nodeagent: true
    was_verify_after_start: true

    was_was_roots:
      - /opt/WebSphere/AppServer/profiles

    was_dmgr_profile_name_hints:
      - dmgr
      - Dmgr
      - DMGR
      - deploymentmanager
      - DeploymentManager
      - deploymanager
      - DeployManager
      - manager
      - Manager
      - cellmanager
      - CellManager

    was_node_profile_name_hints:
      - proc
      - Proc
      - procserv
      - ProcServ
      - procserver
      - ProcServer
      - processserver
      - ProcessServer
      - appsrv
      - AppSrv
      - appserver
      - AppServer
      - node
      - Node
      - custom
      - Custom

  tasks:
    - name: Safety check - require explicit approval for disruptive actions
      ansible.builtin.assert:
        that:
          - was_allow_disruptive | default(false) | bool
        fail_msg: >
          Disruptive actions are disabled.
          Set was_allow_disruptive=true (survey/extra vars) to proceed.
      run_once: true
      become: false

    - name: Validate required vars (DMGR + node)
      ansible.builtin.assert:
        that:
          - was_dmgr_host is defined
          - was_dmgr_host | length > 0
          - was_wsadmin_user is defined
          - was_wsadmin_user | length > 0
          - was_wsadmin_pass is defined
          - was_wsadmin_pass | length > 0
          - was_node_name is defined
          - was_node_name | length > 0
        fail_msg: >
          Missing required variables. Ensure DMGR vars (was_dmgr_host,
          was_wsadmin_user, was_wsadmin_pass) and per-host node vars
          (was_node_name) are set via inventory or survey.
      become: false

    - name: Resolve wsadmin.sh path on the DMGR host
      ansible.builtin.include_tasks:
        file: was_resolve_was_scripts.yml
      vars:
        was_resolve_delegate_host: "{{ was_dmgr_host }}"
        was_resolve_find_filename: wsadmin.sh
        was_resolve_result_var: was_resolved_wsadmin_path
        was_resolve_profile_hints: "{{ was_dmgr_profile_name_hints }}"
      run_once: true

    - name: Resolve startManager.sh path on the DMGR host
      ansible.builtin.include_tasks:
        file: was_resolve_was_scripts.yml
      vars:
        was_resolve_delegate_host: "{{ was_dmgr_host }}"
        was_resolve_find_filename: startManager.sh
        was_resolve_result_var: was_resolved_startmanager_path
        was_resolve_profile_hints: "{{ was_dmgr_profile_name_hints }}"
      run_once: true

    - name: Derive DMGR trace path from resolved wsadmin.sh
      ansible.builtin.set_fact:
        was_resolved_wsadmin_trace_path: >-
          {{
            (was_resolved_wsadmin_path | dirname | dirname) ~ '/logs/wsadmin.traceout'
          }}
      run_once: true
      become: false

    - name: Show resolved DMGR paths
      ansible.builtin.debug:
        msg:
          - "Resolved wsadmin.sh on {{ was_dmgr_host }}: {{ was_resolved_wsadmin_path }}"
          - "Resolved startManager.sh on {{ was_dmgr_host }}: {{ was_resolved_startmanager_path }}"
          - "Derived wsadmin.traceout path: {{ was_resolved_wsadmin_trace_path }}"
      run_once: true
      become: false

    - name: Ensure wsadmin staging directory exists on DMGR
      ansible.builtin.file:
        path: "{{ was_wsadmin_stage_dir }}"
        state: directory
        mode: "0755"
      delegate_to: "{{ was_dmgr_host }}"
      run_once: true
      become: false

    - name: Stage wsadmin helper scripts to DMGR
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../roles/was_wsadmin/files/{{ item }}"
        dest: "{{ was_wsadmin_stage_dir }}/{{ item }}"
        mode: "0755"
      loop:
        - discover_targets.py
        - server_state.py
        - control_server.py
      delegate_to: "{{ was_dmgr_host }}"
      run_once: true
      become: false

    - name: Smoke test - verify deploy can su to wsadmin
      block:
        - name: Run su to wsadmin with id/whoami
          ansible.builtin.shell: >
            set -euo pipefail &&
            {{ was_su_wsadmin_prefix }} "id && whoami"
          args:
            executable: /bin/bash
          register: su_wsadmin_test
          delegate_to: "{{ was_dmgr_host }}"
          run_once: true
          changed_when: false
          become: false

      rescue:
        - name: Collect diagnostic - deploy identity
          ansible.builtin.shell: >
            set -euo pipefail && id && whoami && groups
          args:
            executable: /bin/bash
          register: dmgr_deploy_id
          delegate_to: "{{ was_dmgr_host }}"
          run_once: true
          changed_when: false
          become: false

        - name: Collect diagnostic - su policy hints
          ansible.builtin.shell: >
            set -euo pipefail &&
            (test -r /etc/pam.d/su && sed -n '1,200p' /etc/pam.d/su) || echo "cannot read /etc/pam.d/su" &&
            echo "----" &&
            (test -r /etc/login.defs && grep -E '^(SU_|SULOG|ENV_SUPATH|ENV_PATH)' /etc/login.defs || true)
          args:
            executable: /bin/bash
          register: dmgr_su_policy
          delegate_to: "{{ was_dmgr_host }}"
          run_once: true
          changed_when: false
          become: false

        - name: Collect diagnostic - tail /var/log/secure
          ansible.builtin.shell: >
            set -euo pipefail &&
            f="/var/log/secure" &&
            if [ -r "$f" ]; then tail -n 120 "$f"; else echo "No readable $f"; fi
          args:
            executable: /bin/bash
          register: dmgr_secure_tail
          delegate_to: "{{ was_dmgr_host }}"
          run_once: true
          changed_when: false
          become: false

        - name: Fail - cannot su to wsadmin
          ansible.builtin.fail:
            msg: |
              deploy cannot su to wsadmin non-interactively on DMGR host {{ was_dmgr_host }}.

              --- deploy identity ---
              {{ dmgr_deploy_id.stdout | default('') }}
              {{ dmgr_deploy_id.stderr | default('') }}

              --- su policy hints ---
              {{ dmgr_su_policy.stdout | default('') }}
              {{ dmgr_su_policy.stderr | default('') }}

              --- /var/log/secure tail ---
              {{ dmgr_secure_tail.stdout | default('') }}
              {{ dmgr_secure_tail.stderr | default('') }}
      run_once: true

    - name: Start DMGR
      when: was_start_dmgr | bool
      ansible.builtin.shell: >
        set -euo pipefail &&
        {{ was_su_wsadmin_prefix }} "'{{ was_resolved_startmanager_path }}'"
      args:
        executable: /bin/bash
      delegate_to: "{{ was_dmgr_host }}"
      run_once: true
      register: dmgr_start
      changed_when: >
        ("already running" not in (dmgr_start.stdout | default('') | lower)) and
        ("already started" not in (dmgr_start.stdout | default('') | lower))
      failed_when: >
        dmgr_start.rc != 0 and
        ("ADMU0116I" not in (dmgr_start.stdout | default(''))) and
        ("already running" not in (dmgr_start.stdout | default('') | lower)) and
        ("already started" not in (dmgr_start.stdout | default('') | lower))
      become: false

    - name: Show DMGR start result
      when: was_start_dmgr | bool
      ansible.builtin.debug:
        msg:
          - "DMGR start rc={{ dmgr_start.rc | default('n/a') }}"
          - "stdout={{ dmgr_start.stdout_lines | default([]) }}"
      run_once: true
      become: false

    - name: Wait for DMGR SOAP port to be reachable
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ was_dmgr_soap_port }}"
        timeout: "{{ was_dmgr_soap_wait_timeout_sec }}"
        state: started
      register: dmgr_soap_wait
      delegate_to: "{{ was_dmgr_host }}"
      run_once: true
      become: false
      failed_when: false

    - name: DMGR diag - collect diagnostics when SOAP not reachable
      when: dmgr_soap_wait is failed or (dmgr_soap_wait.state is defined and dmgr_soap_wait.state != 'started')
      block:
        - name: Collect diagnostic - netstat/ss for SOAP port
          ansible.builtin.shell: >
            set -euo pipefail &&
            (command -v ss >/dev/null 2>&1 && ss -ltnp | grep -E '(:{{ was_dmgr_soap_port }}\s)') ||
            (command -v netstat >/dev/null 2>&1 && netstat -ltnp 2>/dev/null | grep -E '(:{{ was_dmgr_soap_port }}\s)') ||
            echo "No ss/netstat output for port {{ was_dmgr_soap_port }} (or tools missing)."
          args:
            executable: /bin/bash
          register: dmgr_port_diag
          delegate_to: "{{ was_dmgr_host }}"
          run_once: true
          changed_when: false
          become: false

        - name: Collect diagnostic - tail wsadmin.traceout
          ansible.builtin.shell: >
            set -euo pipefail &&
            f="{{ was_resolved_wsadmin_trace_path }}" &&
            if [ -f "$f" ]; then tail -n 120 "$f"; else echo "No wsadmin.traceout at $f"; fi
          args:
            executable: /bin/bash
          register: dmgr_wsadmin_trace_tail
          delegate_to: "{{ was_dmgr_host }}"
          run_once: true
          changed_when: false
          become: false

        - name: Fail - DMGR SOAP port not reachable
          ansible.builtin.fail:
            msg: |
              DMGR SOAP port {{ was_dmgr_soap_port }} NOT reachable on {{ was_dmgr_host }} (localhost).

              --- Port listeners ---
              {{ dmgr_port_diag.stdout | default('') }}
              {{ dmgr_port_diag.stderr | default('') }}

              --- wsadmin.traceout tail ---
              {{ dmgr_wsadmin_trace_tail.stdout | default('') }}
              {{ dmgr_wsadmin_trace_tail.stderr | default('') }}
      run_once: true

    - name: Build node list from limited hosts
      ansible.builtin.set_fact:
        was_nodes_in_scope: >-
          {{
            ansible_play_hosts
            | map('extract', hostvars, 'was_node_name')
            | list
            | unique
          }}
      run_once: true
      become: false

    - name: Show play hosts and resolved node names
      ansible.builtin.debug:
        msg:
          - "ansible_play_hosts={{ ansible_play_hosts }}"
          - "host_to_node={{ dict(ansible_play_hosts | zip(ansible_play_hosts | map('extract', hostvars, 'was_node_name'))) }}"
          - "was_nodes_in_scope={{ was_nodes_in_scope }}"
      run_once: true
      become: false

    - name: Discover application servers via DMGR
      ansible.builtin.shell: >
        set -euo pipefail &&
        {{ was_su_wsadmin_prefix }} "'{{ was_resolved_wsadmin_path }}'
        -quiet -lang jython
        -conntype SOAP -host 127.0.0.1 -port '{{ was_dmgr_soap_port }}'
        -user '{{ was_wsadmin_user }}' -password '{{ was_wsadmin_pass }}'
        -f '{{ was_wsadmin_stage_dir }}/discover_targets.py'
        --nodes {{ was_nodes_in_scope | join(' ') }}"
      args:
        executable: /bin/bash
      register: discovery_out
      delegate_to: "{{ was_dmgr_host }}"
      run_once: true
      changed_when: false
      failed_when: false
      become: false

    - name: Discovery diag - show stdout/stderr if wsadmin failed
      when: discovery_out.rc != 0
      block:
        - name: Show discovery failure output
          ansible.builtin.debug:
            msg: |
              Discovery failed rc={{ discovery_out.rc }}

              --- stdout ---
              {{ discovery_out.stdout | default('') }}

              --- stderr ---
              {{ discovery_out.stderr | default('') }}
          run_once: true

        - name: Tail wsadmin.traceout after discovery failure
          ansible.builtin.shell: >
            set -euo pipefail &&
            f="{{ was_resolved_wsadmin_trace_path }}" &&
            if [ -f "$f" ]; then tail -n 180 "$f"; else echo "No wsadmin.traceout at $f"; fi
          args:
            executable: /bin/bash
          register: wsadmin_trace_after_discovery
          delegate_to: "{{ was_dmgr_host }}"
          run_once: true
          changed_when: false
          become: false

        - name: Fail - discovery failed
          ansible.builtin.fail:
            msg: |
              Discover application servers via DMGR failed.
              rc={{ discovery_out.rc }}

              --- discovery stdout ---
              {{ discovery_out.stdout | default('') }}

              --- discovery stderr ---
              {{ discovery_out.stderr | default('') }}

              --- wsadmin.traceout tail ---
              {{ wsadmin_trace_after_discovery.stdout | default('') }}
              {{ wsadmin_trace_after_discovery.stderr | default('') }}
      run_once: true

    - name: Extract last JSON line from wsadmin output
      ansible.builtin.set_fact:
        was_discovery_json_extracted: >-
          {{
            (
              discovery_out.stdout_lines | default([])
              | select('match', '^\{"targets":.*\}$')
              | list
              | last
            ) | default('')
          }}
      run_once: true
      become: false

    - name: Parse discovery JSON
      when: was_discovery_json_extracted | length > 0
      ansible.builtin.set_fact:
        was_discovery_json: "{{ was_discovery_json_extracted | from_json }}"
      run_once: true
      become: false

    - name: Validate JSON payload exists
      ansible.builtin.assert:
        that:
          - was_discovery_json is defined
          - was_discovery_json.targets is defined
        fail_msg: |
          wsadmin output did not contain a valid JSON object.
          Extracted line: {{ was_discovery_json_extracted | default('') }}
          --- Full stdout (first 1200 chars) ---
          {{ (discovery_out.stdout | default(''))[:1200] }}
          --- Full stderr (first 1200 chars) ---
          {{ (discovery_out.stderr | default(''))[:1200] }}
      run_once: true
      become: false

    - name: Build discovered target list
      ansible.builtin.set_fact:
        was_discovered_targets_all: "{{ was_discovery_json.targets | default([]) }}"
      run_once: true
      become: false

    - name: Show discovery errors, if any
      ansible.builtin.debug:
        msg: >-
          {{
            was_discovered_targets_all
            | rejectattr('server', 'defined')
            | list
          }}
      when: >
        (
          was_discovered_targets_all
          | rejectattr('server', 'defined')
          | list
          | length
        ) > 0
      run_once: true
      become: false

    - name: Filter discovered targets to nodes in scope
      ansible.builtin.set_fact:
        was_discovered_targets: >-
          {{
            was_discovered_targets_all
            | selectattr('server', 'defined')
            | selectattr('node', 'in', was_nodes_in_scope)
            | list
            | sort(attribute='node')
          }}
      run_once: true
      become: false

    - name: Fail if no targets discovered
      ansible.builtin.assert:
        that:
          - was_discovered_targets | length > 0
        fail_msg: >
          Discovery returned zero application servers for nodes {{ was_nodes_in_scope }}.
          Check was_node_name host_vars and DMGR visibility.
      run_once: true
      become: false

    - name: Show discovered targets
      ansible.builtin.debug:
        msg: >-
          {{
            was_discovered_targets
            | map(attribute='node')
            | zip(was_discovered_targets | map(attribute='server'))
            | map('join', '/')
            | list
          }}
      run_once: true
      become: false

    - name: Resolve startNode.sh path on this host
      when: was_start_nodeagent | bool
      ansible.builtin.include_tasks:
        file: was_resolve_was_scripts.yml
      vars:
        was_resolve_delegate_host: "{{ inventory_hostname }}"
        was_resolve_find_filename: startNode.sh
        was_resolve_result_var: was_resolved_startnode_path
        was_resolve_profile_hints: "{{ was_node_profile_name_hints }}"

    - name: Show resolved startNode.sh path
      when: was_start_nodeagent | bool
      ansible.builtin.debug:
        msg: "Resolved startNode.sh on {{ inventory_hostname }}: {{ was_resolved_startnode_path }}"
      become: false

    - name: Start nodeagent on this host
      when: was_start_nodeagent | bool
      ansible.builtin.shell: >
        set -euo pipefail &&
        {{ was_su_wsadmin_prefix }} "'{{ was_resolved_startnode_path }}'"
      args:
        executable: /bin/bash
      register: nodeagent_start
      changed_when: >
        ("already running" not in (nodeagent_start.stdout | default('') | lower)) and
        ("already started" not in (nodeagent_start.stdout | default('') | lower))
      failed_when: >
        nodeagent_start.rc != 0 and
        ("ADMU0116I" not in (nodeagent_start.stdout | default(''))) and
        ("already running" not in (nodeagent_start.stdout | default('') | lower)) and
        ("already started" not in (nodeagent_start.stdout | default('') | lower))
      become: false

    - name: Show nodeagent start result
      when: was_start_nodeagent | bool
      ansible.builtin.debug:
        msg:
          - "Nodeagent start on {{ inventory_hostname }}: rc={{ nodeagent_start.rc }}"
          - "stdout={{ nodeagent_start.stdout_lines | default([]) }}"
      become: false

    - name: Start discovered application servers via DMGR
      ansible.builtin.shell: >
        set -euo pipefail &&
        {{ was_su_wsadmin_prefix }} "'{{ was_resolved_wsadmin_path }}'
        -quiet -lang jython
        -conntype SOAP -host 127.0.0.1 -port '{{ was_dmgr_soap_port }}'
        -user '{{ was_wsadmin_user }}' -password '{{ was_wsadmin_pass }}'
        -f '{{ was_wsadmin_stage_dir }}/control_server.py'
        --action start
        --node '{{ item.node }}'
        --server '{{ item.server }}'
        --timeout '{{ was_poll_timeout_sec }}'
        --delay '{{ was_poll_delay_sec }}'"
      args:
        executable: /bin/bash
      register: start_out
      delegate_to: "{{ was_dmgr_host }}"
      loop: "{{ was_discovered_targets }}"
      loop_control:
        label: "{{ item.node }}/{{ item.server }}"
      run_once: true
      changed_when: "'CHANGED:true' in (start_out.stdout | default(''))"
      failed_when: false
      become: false

    - name: Show start results
      ansible.builtin.debug:
        msg: "{{ start_out.results | map(attribute='stdout_lines') | list }}"
      when: start_out.results is defined
      run_once: true
      become: false

    - name: Verify discovered servers are RUNNING or STARTED
      when: was_verify_after_start | bool
      ansible.builtin.shell: >
        set -euo pipefail &&
        {{ was_su_wsadmin_prefix }} "'{{ was_resolved_wsadmin_path }}'
        -quiet -lang jython
        -conntype SOAP -host 127.0.0.1 -port '{{ was_dmgr_soap_port }}'
        -user '{{ was_wsadmin_user }}' -password '{{ was_wsadmin_pass }}'
        -f '{{ was_wsadmin_stage_dir }}/server_state.py'
        --node '{{ item.node }}'
        --server '{{ item.server }}'"
      args:
        executable: /bin/bash
      register: verify_out
      delegate_to: "{{ was_dmgr_host }}"
      loop: "{{ was_discovered_targets }}"
      loop_control:
        label: "{{ item.node }}/{{ item.server }}"
      run_once: true
      changed_when: false
      failed_when: false
      become: false

    - name: Build verification summary
      when:
        - was_verify_after_start | bool
        - verify_out.results is defined
      ansible.builtin.set_fact:
        was_verify_successes: >-
          {{
            verify_out.results
            | selectattr('stdout', 'search', '=RUNNING|=STARTED')
            | map(attribute='item')
            | map(attribute='node')
            | zip(
                verify_out.results
                | selectattr('stdout', 'search', '=RUNNING|=STARTED')
                | map(attribute='item')
                | map(attribute='server')
              )
            | map('join', '/')
            | list
          }}
        was_verify_failures: >-
          {{
            verify_out.results
            | rejectattr('stdout', 'search', '=RUNNING|=STARTED')
            | map(attribute='item')
            | map(attribute='node')
            | zip(
                verify_out.results
                | rejectattr('stdout', 'search', '=RUNNING|=STARTED')
                | map(attribute='item')
                | map(attribute='server')
              )
            | map('join', '/')
            | list
          }}
      run_once: true
      become: false

    - name: Show verification results
      when:
        - was_verify_after_start | bool
        - verify_out.results is defined
      ansible.builtin.debug:
        msg:
          - "Verified RUNNING/STARTED: {{ was_verify_successes | default([]) }}"
          - "Not verified RUNNING/STARTED: {{ was_verify_failures | default([]) }}"
      run_once: true
      become: false

    - name: Build start-attempt summary
      when: start_out.results is defined
      ansible.builtin.set_fact:
        was_start_attempt_successes: >-
          {{
            start_out.results
            | rejectattr('rc', 'ne', 0)
            | map(attribute='item')
            | map(attribute='node')
            | zip(
                start_out.results
                | rejectattr('rc', 'ne', 0)
                | map(attribute='item')
                | map(attribute='server')
              )
            | map('join', '/')
            | list
          }}
        was_start_attempt_failures: >-
          {{
            start_out.results
            | selectattr('rc', 'ne', 0)
            | map(attribute='item')
            | map(attribute='node')
            | zip(
                start_out.results
                | selectattr('rc', 'ne', 0)
                | map(attribute='item')
                | map(attribute='server')
              )
            | map('join', '/')
            | list
          }}
      run_once: true
      become: false

    - name: Show final start summary
      ansible.builtin.debug:
        msg:
          - "Discovered targets: {{ was_discovered_targets | map(attribute='node') | zip(was_discovered_targets | map(attribute='server')) | map('join', '/') | list }}"
          - "Start attempted successfully (rc=0): {{ was_start_attempt_successes | default([]) }}"
          - "Start attempts failed (rc!=0): {{ was_start_attempt_failures | default([]) }}"
          - "Verified RUNNING/STARTED: {{ was_verify_successes | default([]) }}"
          - "Not verified RUNNING/STARTED: {{ was_verify_failures | default([]) }}"
      run_once: true
      become: false

    - name: Fail if any discovered targets were not verified RUNNING/STARTED
      when: was_verify_after_start | bool
      ansible.builtin.assert:
        that:
          - (was_verify_failures | default([]) | length) == 0
        fail_msg: >-
          Some discovered application servers did not verify as RUNNING/STARTED:
          {{ was_verify_failures | default([]) }}
      run_once: true
      become: false
