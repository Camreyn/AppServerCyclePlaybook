---
# =============================================================================
# was_stop_discovered.yml
# Stop discovered WAS application servers on limited tier hosts
#
# This playbook:
#   1. Runs shared pre-flight checks and discovery
#   2. Shows a per-node discovery summary
#   3. Stops each discovered application server via wsadmin on the DMGR host
#   4. Resolves stopNode.sh on each target host
#   5. Optionally stops the nodeagent on each host
#   6. Prints a final stop summary
#
# Required variables:
#   - was_dmgr_host
#   - was_wsadmin_user
#   - was_wsadmin_pass
#   - was_node_name
#   - was_allow_disruptive
#
# Optional variables:
#   - was_run_user (default: wsadmin)
#   - was_dmgr_soap_port (default: 8879)
#   - was_dmgr_soap_wait_timeout_sec (default: 300)
#   - was_poll_timeout_sec (default: 600)
#   - was_poll_delay_sec (default: 5)
#   - was_stop_nodeagent (default: true)
# =============================================================================

- name: Stop discovered WAS application servers on limited tier hosts
  hosts: was_all_nodes
  gather_facts: false

  vars:
    was_run_user: wsadmin
    was_su_wsadmin_prefix: "sudo su - {{ was_run_user }} -c"
    was_wsadmin_stage_dir: /tmp/was_wsadmin_scripts

    was_dmgr_soap_port: 8879
    was_dmgr_soap_wait_timeout_sec: 300

    was_poll_timeout_sec: 600
    was_poll_delay_sec: 5

    was_stop_nodeagent: true

    was_was_roots:
      - /opt/WebSphere/AppServer/profiles

    was_dmgr_profile_name_hints:
      - dmgr
      - Dmgr
      - DMGR
      - deploymentmanager
      - DeploymentManager
      - deploymanager
      - DeployManager
      - manager
      - Manager
      - cellmanager
      - CellManager

    was_node_profile_name_hints:
      - proc
      - Proc
      - procserv
      - ProcServ
      - procserver
      - ProcServer
      - processserver
      - ProcessServer
      - appsrv
      - AppSrv
      - appserver
      - AppServer
      - node
      - Node
      - custom
      - Custom

  tasks:
    - name: Include shared pre-flight tasks
      ansible.builtin.include_tasks:
        file: was_preflight_common.yml

    - name: Build per-node discovery summary
      ansible.builtin.set_fact:
        was_discovery_summary_lines: |
          {% for node_name in was_nodes_in_scope %}
          - {{ node_name }}:
            requested=true
            discovered_appservers={{ (was_discovered_targets | selectattr('node', 'equalto', node_name) | list | length) }}
            discovery_errors={{ (was_discovered_targets_all | selectattr('node', 'equalto', node_name) | rejectattr('server', 'defined') | list) }}
            discovered_servers={{ (was_discovered_targets | selectattr('node', 'equalto', node_name) | map(attribute='server') | list) }}
          {% endfor %}
      run_once: true
      become: false

    - name: Show per-node discovery summary
      ansible.builtin.debug:
        msg: "{{ was_discovery_summary_lines.split('\n') }}"
      run_once: true
      become: false

    - name: Show discovered targets prior to stop
      ansible.builtin.debug:
        msg: >-
          {{
            was_discovered_targets
            | map(attribute='node')
            | zip(was_discovered_targets | map(attribute='server'))
            | map('join', '/')
            | list
          }}
      run_once: true
      become: false

    - name: Stop discovered application servers via DMGR
      ansible.builtin.shell: >
        set -euo pipefail &&
        {{ was_su_wsadmin_prefix }} "'{{ was_resolved_wsadmin_path }}'
        -quiet -lang jython
        -conntype SOAP -host 127.0.0.1 -port '{{ was_dmgr_soap_port }}'
        -user '{{ was_wsadmin_user }}' -password '{{ was_wsadmin_pass }}'
        -f '{{ was_wsadmin_stage_dir }}/control_server.py'
        --action stop
        --node '{{ item.node }}'
        --server '{{ item.server }}'
        --timeout '{{ was_poll_timeout_sec }}'
        --delay '{{ was_poll_delay_sec }}'"
      args:
        executable: /bin/bash
      register: stop_out
      delegate_to: "{{ was_dmgr_host }}"
      loop: "{{ was_discovered_targets }}"
      loop_control:
        label: "{{ item.node }}/{{ item.server }}"
      run_once: true
      changed_when: "'CHANGED:true' in (stop_out.stdout | default(''))"
      failed_when: stop_out.rc != 0
      become: false

    - name: Show stop results
      ansible.builtin.debug:
        msg: "{{ stop_out.results | map(attribute='stdout_lines') | list }}"
      when: stop_out.results is defined
      run_once: true
      become: false

    - name: Build stop-attempt summary
      when: stop_out.results is defined
      ansible.builtin.set_fact:
        was_stop_attempt_successes: >-
          {{
            stop_out.results
            | rejectattr('rc', 'ne', 0)
            | map(attribute='item')
            | map(attribute='node')
            | zip(
                stop_out.results
                | rejectattr('rc', 'ne', 0)
                | map(attribute='item')
                | map(attribute='server')
              )
            | map('join', '/')
            | list
          }}
        was_stop_attempt_failures: >-
          {{
            stop_out.results
            | selectattr('rc', 'ne', 0)
            | map(attribute='item')
            | map(attribute='node')
            | zip(
                stop_out.results
                | selectattr('rc', 'ne', 0)
                | map(attribute='item')
                | map(attribute='server')
              )
            | map('join', '/')
            | list
          }}
      run_once: true
      become: false

    - name: Resolve stopNode.sh path on this host
      when: was_stop_nodeagent | bool
      ansible.builtin.include_tasks:
        file: was_resolve_was_scripts.yml
      vars:
        was_resolve_delegate_host: "{{ inventory_hostname }}"
        was_resolve_find_filename: stopNode.sh
        was_resolve_result_var: was_resolved_stopnode_path
        was_resolve_profile_hints: "{{ was_node_profile_name_hints }}"

    - name: Show resolved stopNode.sh path
      when: was_stop_nodeagent | bool
      ansible.builtin.debug:
        msg: "Resolved stopNode.sh on {{ inventory_hostname }}: {{ was_resolved_stopnode_path }}"
      become: false

    - name: Stop nodeagent on this host
      when: was_stop_nodeagent | bool
      ansible.builtin.shell: >
        set -euo pipefail &&
        {{ was_su_wsadmin_prefix }} "'{{ was_resolved_stopnode_path }}'
        -username '{{ was_wsadmin_user }}'
        -password '{{ was_wsadmin_pass }}'"
      args:
        executable: /bin/bash
      register: nodeagent_stop
      changed_when: >
        ("already stopped" not in (nodeagent_stop.stdout | default('') | lower)) and
        ("not running" not in (nodeagent_stop.stdout | default('') | lower))
      failed_when: >
        nodeagent_stop.rc != 0 and
        ("ADMU0116I" not in (nodeagent_stop.stdout | default(''))) and
        ("already stopped" not in (nodeagent_stop.stdout | default('') | lower)) and
        ("not running" not in (nodeagent_stop.stdout | default('') | lower))
      become: false

    - name: Show nodeagent stop result
      when: was_stop_nodeagent | bool
      ansible.builtin.debug:
        msg:
          - "Nodeagent stop on {{ inventory_hostname }}: rc={{ nodeagent_stop.rc }}"
          - "stdout={{ nodeagent_stop.stdout_lines | default([]) }}"
      become: false

    - name: Build nodeagent stop summary line
      when: was_stop_nodeagent | bool
      ansible.builtin.set_fact:
        was_nodeagent_stop_summary_line: >-
          {{
            inventory_hostname ~
            ' node=' ~ was_node_name ~
            ' rc=' ~ (nodeagent_stop.rc | string) ~
            ' stdout=' ~ ((nodeagent_stop.stdout_lines | default([])) | join(' | '))
          }}
      become: false

    - name: Show final stop summary
      ansible.builtin.debug:
        msg:
          - "Discovered targets: {{ was_discovered_targets | map(attribute='node') | zip(was_discovered_targets | map(attribute='server')) | map('join', '/') | list }}"
          - "Stop attempted successfully (rc=0): {{ was_stop_attempt_successes | default([]) }}"
          - "Stop attempts failed (rc!=0): {{ was_stop_attempt_failures | default([]) }}"
          - "Nodeagent stop summary: {{ was_nodeagent_stop_summary_line | default('nodeagent stop not requested') }}"
      run_once: true
      become: false
